<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b4332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6a4f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#74c69d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40916c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a017;stop-opacity:1" />
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="246"/>
    </clipPath>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="256" cy="256" r="256" fill="url(#goldGrad)"/>

  <!-- Dark green background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- Ground / lawn arc -->
  <ellipse cx="256" cy="340" rx="190" ry="60" fill="#40916c"/>
  <ellipse cx="256" cy="330" rx="190" ry="55" fill="#52b788"/>

  <!-- Grass blades / lawn stripes -->
  <rect x="80" y="295" width="14" height="45" rx="7" fill="#74c69d" opacity="0.7"/>
  <rect x="106" y="285" width="14" height="55" rx="7" fill="#74c69d" opacity="0.8"/>
  <rect x="132" y="290" width="12" height="50" rx="6" fill="#74c69d" opacity="0.6"/>
  <rect x="156" y="282" width="14" height="58" rx="7" fill="#74c69d" opacity="0.9"/>
  <rect x="182" y="288" width="12" height="52" rx="6" fill="#74c69d" opacity="0.7"/>
  <rect x="206" y="278" width="14" height="62" rx="7" fill="#74c69d"/>
  <rect x="232" y="283" width="12" height="57" rx="6" fill="#74c69d" opacity="0.8"/>
  <rect x="256" y="278" width="14" height="62" rx="7" fill="#74c69d"/>
  <rect x="282" y="285" width="12" height="55" rx="6" fill="#74c69d" opacity="0.7"/>
  <rect x="306" y="280" width="14" height="60" rx="7" fill="#74c69d" opacity="0.9"/>
  <rect x="332" y="288" width="12" height="52" rx="6" fill="#74c69d" opacity="0.6"/>
  <rect x="356" y="284" width="14" height="56" rx="7" fill="#74c69d" opacity="0.8"/>
  <rect x="382" y="292" width="12" height="48" rx="6" fill="#74c69d" opacity="0.7"/>
  <rect x="406" y="298" width="12" height="42" rx="6" fill="#74c69d" opacity="0.6"/>

  <!-- Left tree (tall pine) -->
  <!-- trunk -->
  <rect x="118" y="268" width="16" height="38" rx="4" fill="#6b4c11"/>
  <!-- tree layers -->
  <polygon points="126,130 88,230 164,230" fill="#1b4332"/>
  <polygon points="126,155 82,245 170,245" fill="#2d6a4f"/>
  <polygon points="126,185 78,270 174,270" fill="#40916c"/>

  <!-- Right tree (shorter pine) -->
  <rect x="366" y="272" width="14" height="34" rx="4" fill="#6b4c11"/>
  <polygon points="373,160 338,245 408,245" fill="#1b4332"/>
  <polygon points="373,182 334,258 412,258" fill="#2d6a4f"/>
  <polygon points="373,208 330,278 416,278" fill="#40916c"/>

  <!-- Sun -->
  <circle cx="256" cy="170" r="52" fill="url(#goldGrad)"/>
  <!-- Sun rays -->
  <g fill="#f0c040" opacity="0.85">
    <rect x="251" y="95" width="10" height="28" rx="5"/>
    <rect x="251" y="217" width="10" height="28" rx="5" transform="rotate(180 256 231)"/>
    <rect x="181" y="165" width="28" height="10" rx="5"/>
    <rect x="303" y="165" width="28" height="10" rx="5"/>
    <!-- diagonal rays -->
    <rect x="198" y="110" width="10" height="26" rx="5" transform="rotate(45 203 123)"/>
    <rect x="296" y="110" width="10" height="26" rx="5" transform="rotate(-45 301 123)"/>
    <rect x="198" y="208" width="10" height="26" rx="5" transform="rotate(-45 203 221)"/>
    <rect x="296" y="208" width="10" height="26" rx="5" transform="rotate(45 301 221)"/>
  </g>

  <!-- Gold ring accent at bottom -->
  <path d="M 30 380 Q 256 460 482 380" stroke="url(#goldGrad)" stroke-width="5" fill="none" opacity="0.4"/>

  <!-- Text: GreenVista -->
  <text x="256" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#f0c040" letter-spacing="1">GreenVista</text>
  <!-- Text: LANDSCAPING -->
  <text x="256" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="600" fill="#74c69d" letter-spacing="4">LANDSCAPING</text>
</svg>
